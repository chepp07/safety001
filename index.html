  .notice-box {
    background: #fff8f0; border-left: 3px solid #e05c00;

  }
  .section-title::after {
    content:''; flex:1; height:1px; background:#ffe0cc;

    background: #fff; border-radius: 14px;

  .input, .select, .textarea {

  .success-icon {

  .success-title { font-size: 19px; font-weight: 700; margin-bottom: 10px; }
  .success-desc { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 1.25rem; }
  .receipt {
    background: #f5f8fc; border-radius: 10px; padding: 1rem 1.25rem;

  .receipt .lv2-text { color: #e65100; font-weight: 700; }
  .receipt .lv3-text { color: #2e7d32; font-weight: 700; }

    border: none; border-radius: 9px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;

  .reset-btn:hover { background: #c44f00; }

  /* ── 로딩 ── */
  .loading-bar { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }

  /* ── 에러 배너 ── */
  .err-banner {
    background: #fff0ee; border: 1px solid #f5b7b1; border-radius: 9px;
    padding: 10px 14px; font-size: 13px; color: #c0392b; margin-bottom: 12px;

  .admin-link {
    font-size: 12px; color: #ccc; background: none; border: none;
    cursor: pointer; text-decoration: underline; font-family: inherit;

  .setup-banner {
    background: #fffbe6; border: 1px solid #f9c74f; border-radius: 10px;
    padding: 1rem 1.25rem; font-size: 13px; color: #7a6000;
    line-height: 1.8; margin-bottom: 1.25rem;

    background: #fff3c4; padding: 1px 5px; border-radius: 4px;

    margin-bottom: 12px; letter-spacing: .04em;
  }

    .radio-row { gap: 6px; }
    .radio-btn { padding: 7px 12px; font-size: 13px; }
  }
</style>
</head>

/* ── 현재 날짜/시간 기본값 생성 ── */
function getNowDefaults(){
  const now = new Date();
  const h24 = now.getHours();
  const ampm = h24 < 12 ? "오전" : "오후";
  const h12 = h24 % 12 === 0 ? 12 : h24 % 12;
  const min = Math.floor(now.getMinutes() / 5) * 5; // 5분 단위 반올림
  return {
    accYear:  String(now.getFullYear()),
    accMonth: String(now.getMonth()+1).padStart(2,"0"),
    accDay:   String(now.getDate()).padStart(2,"0"),
    accAmPm:  ampm,
    accHour:  String(h12).padStart(2,"0"),
    accMin:   String(min).padStart(2,"0"),
  };
}

/* ── 전화번호 포매팅 ── */
function fmt(v){
  v = v.replace(/\D/g, "");
  if(v.length<=3) return v;
  if(v.length<=7) return v.slice(0,3)+"-"+v.slice(3);
  return v.slice(0,3)+"-"+v.slice(3,7)+"-"+v.slice(7,11);
}

/* ── 사고번호 생성 ── */
function genAccNo(){
  const d = new Date();
  const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  const cnt = Object.values(entries).filter(e => e.accNo && e.accNo.startsWith("ACC-"+ymd)).length;
  return `ACC-${ymd}-${String(cnt+1).padStart(3,"0")}`;
}

}

}

        <div style="background:#f0faf0;border:1px solid #b8e0ba;border-radius:9px;padding:10px 12px;margin-bottom:8px;font-size:13px;color:#1a1a1a;line-height:1.7;">

/* ── 이벤트 바인딩 ── */
function bindEvents(){
  const $ = id => document.getElementById(id);

  if(view==="form"){
    $("f-site")     && ($("f-site").onchange     = e => { form.site = e.target.value; delete errors.site; });
    $("f-reporter") && ($("f-reporter").oninput   = e => { form.reporter = e.target.value; delete errors.reporter; });
    $("f-rank")     && ($("f-rank").onchange       = e => { form.rank = e.target.value; delete errors.rank; });
    $("f-phone")    && ($("f-phone").oninput      = e => { const v=fmt(e.target.value); form.phone=v; e.target.value=v; delete errors.phone; });
    $("f-acc-year") && ($("f-acc-year").onchange  = e => { form.accYear=e.target.value; delete errors.accYear; });
    $("f-acc-month")&& ($("f-acc-month").onchange = e => { form.accMonth=e.target.value; delete errors.accMonth; });
    $("f-acc-day")  && ($("f-acc-day").onchange   = e => { form.accDay=e.target.value; delete errors.accDay; });
    $("f-acc-ampm") && ($("f-acc-ampm").onchange  = e => { form.accAmPm=e.target.value; });
    $("f-acc-hour") && ($("f-acc-hour").onchange  = e => { form.accHour=e.target.value; delete errors.accHour; });
    $("f-acc-min")  && ($("f-acc-min").onchange   = e => { form.accMin=e.target.value; delete errors.accMin; });
    $("f-location") && ($("f-location").oninput   = e => { form.location = e.target.value; delete errors.location; });
    $("f-situation")&& ($("f-situation").oninput  = e => { form.situation = e.target.value; delete errors.situation; });
    $("f-action")   && ($("f-action").oninput     = e => { form.actionTaken = e.target.value; });
    $("f-support")  && ($("f-support").oninput    = e => { form.supportNeeded = e.target.value; });

    // 복합사고 토글
    const chkComplex = document.getElementById("chk-complex");
    if(chkComplex) chkComplex.onchange = () => {
      form.isComplex = chkComplex.checked;
      form.accType=""; form.accDetail="";
      form.accTypes=[]; form.accDetails=[];
      delete errors.accType; delete errors.accDetail;
      render();
    };

    // 사고유형 버튼
    document.querySelectorAll("[data-type-btn]").forEach(b => {
      b.onclick = () => {
        const t = b.dataset.typeBtn;
        if(form.isComplex){
          if(form.accTypes.includes(t)) form.accTypes = form.accTypes.filter(x=>x!==t);
          else form.accTypes.push(t);
          // 제거된 유형의 세부유형도 제거
          const accDetailMap2 = {
            "인사사고":["중대재해","일반재해","경미사고","아차사고"],
            "제품사고":["파손","낙하","충격","오염","포장불량","운송중 손상"],
            "공급사고":["이종","불량","결품","누락","서열오류","납입지연","수량불일치","라인투입오류"],
            "차량사고":["자차사고","대물사고"]
          };
          if(!form.accTypes.includes(t)){
            form.accDetails = form.accDetails.filter(d=>!(accDetailMap2[t]||[]).includes(d));
          }
        } else {
          form.accType = t; form.accDetail = "";
        }
        delete errors.accType;
        render();
      };
    });

    // 세부유형 버튼
    document.querySelectorAll("[data-detail-btn]").forEach(b => {
      b.onclick = () => {
        const d = b.dataset.detailBtn;
        if(form.isComplex){
          if(form.accDetails.includes(d)) form.accDetails = form.accDetails.filter(x=>x!==d);
          else form.accDetails.push(d);
        } else {
          form.accDetail = d;
        }
        delete errors.accDetail;
        render();
      };
    });

    // 기존 data-field 버튼 (라인중단, 고객사영향 등)
    document.querySelectorAll("[data-field]").forEach(b => {
      b.onclick = () => {
        const field = b.dataset.field;
        const val   = b.dataset.val;
        form[field]=val; delete errors[field];
        render();
      };
    });

    // 긴급도 버튼
    document.querySelectorAll("[data-lv]").forEach(b => {
      b.onclick = () => { form.level=b.dataset.lv; delete errors.level; render(); };
    });

    // 체크박스
    document.querySelectorAll("[data-chk]").forEach(c => {
      c.onchange = () => {
        form.checks[+c.dataset.chk] = c.checked;
        if(form.checks.every(Boolean)) delete errors.checks;
      };
    });

    $("btn-submit")   && ($("btn-submit").onclick   = handleSubmit);
    $("go-admin")     && ($("go-admin").onclick     = () => showLoginModal());
    $("go-myreport")  && ($("go-myreport").onclick  = () => { view="myreport"; render(); });

    // 인사사고 대상자 입력 바인딩
    document.querySelectorAll(".victim-name").forEach(el=>{
      el.oninput = ()=>{ form.victims[+el.dataset.vi].name=el.value; };
    });
    document.querySelectorAll(".victim-aff").forEach(el=>{
      el.oninput = ()=>{ form.victims[+el.dataset.vi].affiliation=el.value; };
    });
    document.querySelectorAll(".victim-unknown").forEach(el=>{
      el.onchange = ()=>{
        form.victims[+el.dataset.vi].unknown=el.checked;
        if(el.checked){ form.victims[+el.dataset.vi].name="미확인"; form.victims[+el.dataset.vi].affiliation="미확인"; }
        else { form.victims[+el.dataset.vi].name=""; form.victims[+el.dataset.vi].affiliation=""; }
        render();
      };
    });
    document.querySelectorAll(".perp-name").forEach(el=>{
      el.oninput = ()=>{ form.perpetrators[+el.dataset.pi].name=el.value; };
    });
    document.querySelectorAll(".perp-aff").forEach(el=>{
      el.oninput = ()=>{ form.perpetrators[+el.dataset.pi].affiliation=el.value; };
    });
    document.querySelectorAll(".perp-unknown").forEach(el=>{
      el.onchange = ()=>{
        form.perpetrators[+el.dataset.pi].unknown=el.checked;
        if(el.checked){ form.perpetrators[+el.dataset.pi].name="미확인"; form.perpetrators[+el.dataset.pi].affiliation="미확인"; }
        else { form.perpetrators[+el.dataset.pi].name=""; form.perpetrators[+el.dataset.pi].affiliation=""; }
        render();
      };
    });
  }

  if(view==="success"){
    $("btn-reset") && ($("btn-reset").onclick = () => {
      form = makeEmptyForm();
      errors={}; submitted=null; view="form"; render();
    });
    $("btn-go-myreport") && ($("btn-go-myreport").onclick = () => {
      if(submitted) myReportPhone = submitted.phone;
      myReportSelected = null;
      view="myreport"; render();
    });

    // 후속조치 저장
    $("btn-followup") && ($("btn-followup").onclick = async () => {
      const text = $("follow-up-text").value.trim();
      if(!text){ alert("후속조치 내용을 입력해 주세요."); return; }
      if(!submitted) return;
      // Firebase에서 해당 키 찾아서 업데이트
      const snap = Object.entries(entries).find(([,e])=>e.accNo===submitted.accNo);
      if(snap){
        const prev = snap[1].followUp || "";
        const now = new Date().toLocaleString("ko-KR");
        const updated = prev ? prev+"\n\n["+now+"]\n"+text : "["+now+"]\n"+text;
        await update(ref(db,`accidents/${snap[0]}`),{followUp: updated, status:"처리중"});
        $("followup-msg").style.display="block";
        $("follow-up-text").value="";
        setTimeout(()=>{ if($("followup-msg")) $("followup-msg").style.display="none"; },3000);
      }
    });
  }

  if(view==="myreport"){
    const $ = id => document.getElementById(id);
    $("btn-my-back") && ($("btn-my-back").onclick = () => { view="form"; render(); });
    $("btn-my-search") && ($("btn-my-search").onclick = () => {
      const v = $("my-phone").value;
      myReportPhone = v; myReportSelected = null; render();
    });
    $("my-phone") && ($("my-phone").onkeydown = e => {
      if(e.key==="Enter"){
        myReportPhone = $("my-phone").value; myReportSelected=null; render();
      }
    });
    $("my-phone") && ($("my-phone").oninput = e => {
      const v = fmt(e.target.value);
      myReportPhone = v; e.target.value = v;
    });
  }

  if(view==="admin"){
    $("go-form")   && ($("go-form").onclick   = () => { view="form"; render(); });
    $("go-logout") && ($("go-logout").onclick = () => { view="form"; render(); });
    $("a-search")  && ($("a-search").oninput  = e => { filter.search=e.target.value; render(); });
    $("a-acctype") && ($("a-acctype").onchange= e => { filter.accType=e.target.value; render(); });
    $("a-level")   && ($("a-level").onchange  = e => { filter.level=e.target.value; render(); });
    $("btn-excel") && ($("btn-excel").onclick  = () => downloadExcel());

    document.querySelectorAll(".status-sel").forEach(s => {
      s.onchange = () => { update(ref(db,`accidents/${s.dataset.key}`),{status:s.value}); };
    });
    document.querySelectorAll(".del-btn").forEach(b => {
      b.onclick = () => {
        if(!confirm("이 사고 접수 건을 삭제하시겠습니까?")) return;
        remove(ref(db,`accidents/${b.dataset.key}`));
      };
    });

    const modal = $("login-modal");
    if(modal){
      modal.onclick = e => { if(e.target===modal) modal.style.display="none"; };
      $("modal-cancel") && ($("modal-cancel").onclick = () => { modal.style.display="none"; });
      $("modal-login")  && ($("modal-login").onclick  = doModalLogin);
      $("modal-pw")     && ($("modal-pw").onkeydown   = e => { if(e.key==="Enter") doModalLogin(); });
    }
  }
}

window.saveFollowUp = async function(key){
  const el = document.getElementById(`followup-input-${key}`);
  const okEl = document.getElementById(`followup-ok-${key}`);
  if(!el) return;
  const text = el.value.trim();
  if(!text){ alert("후속조치 내용을 입력해 주세요."); return; }
  const prev = (entries[key]||{}).followUp || "";
  const now = new Date().toLocaleString("ko-KR");
  const updated = prev ? prev+"\n\n["+now+"]\n"+text : "["+now+"]\n"+text;
  try{
    await update(ref(db,`accidents/${key}`),{followUp: updated, status:"처리중"});
    el.value = "";
    if(okEl){ okEl.style.display="block"; setTimeout(()=>{ okEl.style.display="none"; },3000); }
  }catch(err){
    alert("저장 중 오류가 발생했습니다. 다시 시도해 주세요.");
  }
};

/* ── 엑셀 다운로드 ── */
function downloadExcel(){
  const list = Object.values(entries);
  if(!list.length){ alert("다운로드할 데이터가 없습니다."); return; }
  const BOM = "\uFEFF";
  const headers = ["사고번호","접수일시","사고발생일시","사업소","접수자","직급","연락처","사고유형","세부유형","긴급도","라인중단","고객사영향","상황","즉시조치","상태"];
  const rows = list.map(e=>[
    e.accNo||"", e.createdAt||"", e.accDateTime||"", e.site||"", e.reporter||"", e.rank||"", e.phone||"",
    e.accType||"", e.accDetail||"",
    {1:"최긴급",2:"긴급",3:"일반"}[e.level]||"",
    e.lineStop||"", e.customerEffect||"",
    e.situation||"", e.actionTaken||"", e.status||""
  ]);
  const csv = BOM + [headers,...rows]
    .map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(","))
    .join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="사고접수현황.csv";
  a.click(); URL.revokeObjectURL(url);
}

/* ── 제출 처리 ── */
async function handleSubmit(){
  const errs={};
  if(!form.site)          errs.site="사업소를 선택해 주세요.";
  if(!form.reporter.trim()) errs.reporter="접수자 성명을 입력해 주세요.";
  if(!form.rank)            errs.rank="직급을 선택해 주세요.";
  if(!form.phone||form.phone.replace(/\D/g,"").length<10) errs.phone="연락처를 입력해 주세요.";
  if(!form.accYear||!form.accMonth||!form.accDay) errs.accYear="사고 발생 날짜를 선택해 주세요.";
  if(!form.accHour||!form.accMin) errs.accHour="사고 발생 시간을 선택해 주세요.";
  if(!form.location.trim()) errs.location="사고 발생 위치를 입력해 주세요.";
  if(form.isComplex){
    if(form.accTypes.length===0) errs.accType="사고 유형을 하나 이상 선택해 주세요.";
    if(form.accDetails.length===0) errs.accDetail="세부 유형을 하나 이상 선택해 주세요.";
  } else {
    if(!form.accType) errs.accType="사고 유형을 선택해 주세요.";
    if(!form.accDetail) errs.accDetail="세부 유형을 선택해 주세요.";
  }
  if(!form.accType)       errs.accType="사고 유형을 선택해 주세요.";
  if(!form.accDetail)     errs.accDetail="세부 유형을 선택해 주세요.";
  if(!form.level)         errs.level="긴급도를 선택해 주세요.";
  if(!form.lineStop)      errs.lineStop="라인중단 여부를 선택해 주세요.";
  if(!form.customerEffect) errs.customerEffect="고객사 영향 여부를 선택해 주세요.";
  if(!form.situation.trim()) errs.situation="현재 상황을 입력해 주세요.";
  if(form.checks.some(c=>!c)) errs.checks="모든 확인 사항을 체크해 주세요.";
  // 인사사고 대상자 검증
  const hasPersonalAcc = form.isComplex ? form.accTypes.includes("인사사고") : form.accType==="인사사고";
  if(hasPersonalAcc){
    if(!form.accidentType) errs.accidentType="단독/쌍방 여부를 선택해 주세요.";
    const victimOk = form.victims.every(v=>v.unknown||v.name.trim());
    if(!victimOk) errs.victims="피해자 성명을 입력하거나 '미확인'을 체크해 주세요.";
    if(form.accidentType==="쌍방사고"){
      const perpOk = form.perpetrators.every(p=>p.unknown||p.name.trim());
      if(!perpOk) errs.perpetrators="가해자 성명을 입력하거나 '미확인'을 체크해 주세요.";
    }
  }
  if(Object.keys(errs).length){ errors=errs; render(); window.scrollTo(0,0); return; }

  saving=true; render();
  const accNo = genAccNo();
  const entry={
    accNo,
    site: form.site,
    reporter: form.reporter.trim(),
    rank: form.rank,
    phone: form.phone,
    accDateTime: `${form.accYear}년 ${form.accMonth}월 ${form.accDay}일 ${form.accAmPm} ${form.accHour}시 ${form.accMin}분`,
    location: form.location.trim(),
    isComplex: form.isComplex,
    accType: form.isComplex ? form.accTypes.join(", ") : form.accType,
    accDetail: form.isComplex ? form.accDetails.join(", ") : form.accDetail,
    accTypes: form.isComplex ? form.accTypes.join(", ") : "",
    accDetails: form.isComplex ? form.accDetails.join(", ") : "",
    level: form.level,
    lineStop: form.lineStop,
    customerEffect: form.customerEffect,
    situation: form.situation.trim(),
    actionTaken: form.actionTaken.trim()||"없음",
    supportNeeded: form.supportNeeded.trim()||"없음",
    accidentType: form.accidentType||"",
    victims: (form.isComplex?form.accTypes.includes("인사사고"):form.accType==="인사사고") ? JSON.stringify(form.victims) : "",
    perpetrators: (form.isComplex?form.accTypes.includes("인사사고"):form.accType==="인사사고")&&form.accidentType==="쌍방사고" ? JSON.stringify(form.perpetrators) : "",
    followUp: "",
    status: "접수",
    createdAt: new Date().toLocaleString("ko-KR")
  };
  try{
    await push(ref(db,"accidents"), entry);
    submitted=entry; view="success";
    // Slack 알림 발송
    sendSlackAlert(entry);
  }catch(err){
    errors={submit:"저장 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요."};
  }
  saving=false; render();
}

/* ── 알림 발송 (GAS 경유 → Slack + SMS) ── */
async function sendSlackAlert(e){
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyS-dsOL7tjKLcrDrXV-iDZurGxAhzgpT0GOWF4QWEYpWyFygqMZjIsKcpQL0zuESMn/exec";

  try {
    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(e)
    });
  } catch(err) {
    console.warn("알림 발송 실패:", err);
  }
}
