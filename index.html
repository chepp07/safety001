<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#e05c00"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="사고접수"/>
<meta name="description" content="현장 사고 즉시 접수 시스템"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>현장 사고 접수</title>
<link rel="stylesheet" href="style.css"/>

<!-- WebView 감지: 모듈 로딩 전에 실행되어야 하므로 인라인 유지 -->
<script>
(function(){
  var ua = navigator.userAgent || "";
  var isWebView = /KAKAOTALK|NAVER|Line\/|Instagram|FB_IAB|FBAN|FBAV|Twitter|MicroMessenger/i.test(ua);
  if(isWebView){
    document.addEventListener("DOMContentLoaded", function(){
      var d = document.getElementById("app");
      if(!d) return;
      d.innerHTML = [
        '<div style="padding:2rem 1.5rem;text-align:center;font-family:sans-serif;">',
        '<div style="font-size:40px;margin-bottom:1rem;">🌐</div>',
        '<div style="font-size:18px;font-weight:700;margin-bottom:8px;">외부 브라우저로 열기</div>',
        '<div style="font-size:14px;color:#666;line-height:1.8;margin-bottom:1.5rem;">',
          '카카오톡·네이버 등 앱 내 브라우저는<br>일부 기능이 제한됩니다.<br>',
          '<strong>Chrome 또는 Safari</strong>로 열어주세요.',
        '</div>',
        '<button onclick="navigator.clipboard.writeText(location.href).then(function(){alert(\'링크가 복사되었습니다!\');})"',
          ' style="padding:12px 28px;background:#1e2761;color:#fff;border:none;border-radius:9px;',
          'font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">',
          '링크 복사',
        '</button>',
        '</div>'
      ].join("");
    });
  }
})();
</script>
</head>
<body>

<div class="page" id="app">
  <div class="loading-bar">불러오는 중...</div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
